spring:
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
  application:
    name: lecture02
  security:
    user:
      name: user
      password: user
      roles: USER
logging:
  file:
    name: logs/myapp.log
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: TRACE

management:

  tracing:
    sampling:
      probability: 1.0
