#          endpoint: http://localhost:4318/v1/traces
#  otlp:
#    metrics:
#      export:
#        url: http://localhost:4318/v1/traces
#        enabled: true
jdbc:
  datasource-proxy:
    enabled: true
  includes: connection, query, fetch
